<body>
<div id="app"></div>
<script>
// ── Storage keys ──────────────────────────────────────────────────────────
const SK = {
  config:  'config',
  exam:    'exam',
  akey:    'akey',
  content: 'content',
  mode:    'mode',
  groups:  'groups',
  exhist:  'exhist',
  idx:     g => 'idx_' + (g||'all'),
  sub:     (name, grp) => 'sub_' + btoa(unescape(encodeURIComponent((grp||'')+'||'+name))).replace(/[=+/]/g,'_').slice(0,60)
};

const COLORS = ['#185FA5','#3B6D11','#854F0B','#534AB7','#993556','#0F6E56','#993C1D'];

// ── Storage — local server API ──────────────────────────────────────────
// ── Google Sheets via opensheet.elk.sh ───────────────────────────────────
// CONFIGURACION: ID de tu Google Sheet (está en la URL de la hoja)
// Ejemplo URL: docs.google.com/spreadsheets/d/ESTE_ES_EL_ID/edit
const SHEET_ID   = "1h_hsWvo_oBXSR6qnFtWYbOEBwwBC4mJZM1cjDMeIxlk";
const SHEET_NAME = "Hoja 1";   // nombre de la pestaña

// opensheet.elk.sh lee la hoja como JSON (solo lectura publica)
// Para escritura usamos Google Sheets API v4 con clave publica
// PERO: usaremos una hoja como "log" donde cada fila es clave=valor
// Escritura via Google Apps Script URL (ya la tenemos):
const GAS_URL = "https://script.google.com/macros/s/AKfycbxBwAqPQ0Gu_cIkA5mhe3g9QBGL2ULTjUXnw9cz_KaxgcK5gYt_McNh--HQWwOFtBlfbA/exec";

let storageOK = false;

// Para valores grandes, dividir en trozos de 800 chars
const CHUNK = 800;

async function gasCall(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(String(v)))
    .join('&');
  // Usar no-cors para evitar bloqueos de CORS; la respuesta sera opaca
  // pero el servidor SI ejecuta el codigo
  try {
    const r = await fetch(GAS_URL + '?' + qs, {
      method: 'GET',
      mode: 'no-cors'
    });
    return '1'; // con no-cors no podemos leer la respuesta, asumimos exito
  } catch(e) {
    throw e;
  }
}

// Para leer usamos opensheet que SI tiene CORS
async function sheetRead() {
  const url = 'https://opensheet.elk.sh/' + SHEET_ID + '/' + encodeURIComponent(SHEET_NAME);
  const r = await fetch(url);
  if (!r.ok) return {};
  const rows = await r.json();
  const obj = {};
  if (Array.isArray(rows)) {
    rows.forEach(row => {
      if (row.clave !== undefined && row.valor !== undefined) {
        obj[String(row.clave)] = String(row.valor);
      }
    });
  }
  return obj;
}

let _cache = null;
let _cacheTime = 0;

async function getCache() {
  const now = Date.now();
  if (_cache && (now - _cacheTime) < 2000) return _cache;
  try {
    _cache = await sheetRead();
    _cacheTime = now;
  } catch(e) {
    if (!_cache) _cache = {};
  }
  return _cache;
}

function fk(k){ return String(k).replace(/[.#$[\]]/g,'_'); }

async function sGet(k) {
  try {
    const data = await getCache();
    const key = fk(k);
    // Check for chunked value
    const nStr = data[key + '__n'];
    if (nStr && parseInt(nStr) > 1) {
      let val = '';
      const n = parseInt(nStr);
      for (let i = 0; i < n; i++) val += (data[key + '__' + i] || '');
      return val || null;
    }
    const val = data[key];
    return val !== undefined && val !== '' ? val : null;
  } catch { return null; }
}

async function sSet(k, v) {
  try {
    _cache = null; // invalidate cache on write
    const key = fk(k);
    if (!v || v.length <= CHUNK) {
      await gasCall({a:'s', k:key, v: v || ''});
    } else {
      const chunks = [];
      for (let i = 0; i < v.length; i += CHUNK) chunks.push(v.slice(i, i+CHUNK));
      for (let i = 0; i < chunks.length; i++) await gasCall({a:'s', k:key+'__'+i, v:chunks[i]});
      await gasCall({a:'s', k:key+'__n', v:String(chunks.length)});
    }
    return true;
  } catch { return false; }
}

async function sDel(k) {
  try {
    _cache = null;
    const key = fk(k);
    await gasCall({a:'d', k:key});
    // Also delete chunks if any
    const data = await getCache();
    const nStr = data && data[key+'__n'];
    if (nStr) {
      const n = parseInt(nStr);
      for (let i = 0; i < n; i++) await gasCall({a:'d', k:key+'__'+i});
      await gasCall({a:'d', k:key+'__n'});
    }
  } catch {}
}

async function checkStorage() {
  if (!SHEET_ID || SHEET_ID.includes('PEGA_AQUI')) {
    console.warn('SHEET_ID no configurado.');
    return;
  }
  try {
    // Test read via opensheet
    const url = 'https://opensheet.elk.sh/' + SHEET_ID + '/' + encodeURIComponent(SHEET_NAME);
    const r = await fetch(url);
    if (r.ok) {
      storageOK = true;
      // Test write via GAS (fire and forget)
      gasCall({a:'s', k:'_ping', v:String(Date.now())}).catch(()=>{});
    } else {
      console.error('opensheet error:', r.status);
      storageOK = false;
    }
  } catch(e) {
    console.error('checkStorage error:', e.message);
    storageOK = false;
  }
}


async function processExam(examFile, keyFile){
  set({processing:true, err:'', ok:''});
  try{
    const [examTxt, keyTxt] = await Promise.all([
      readDocx(examFile,'text'),
      readDocx(keyFile,'text')
    ]);
    const examParsed = parseExamText(examTxt);
    const keyParsed  = parseAnswerKeyText(keyTxt);

    if(!examParsed.questions || examParsed.questions.length===0)
      throw new Error('No se encontraron preguntas. Verifica el formato del archivo.');
    if(!keyParsed.answers || Object.keys(keyParsed.answers).length===0)
      throw new Error('No se encontraron respuestas. Verifica el formato de la hoja de respuestas.');

    set({
      exam: examParsed,
      answerKey: keyParsed,
      rawExamPreview: examTxt.slice(0,500),
      rawKeyPreview: keyTxt.slice(0,300),
      processing: false,
      ok: `✓ ${examParsed.questions.length} preguntas y ${Object.keys(keyParsed.answers).length} respuestas extraídas correctamente`
    });
  }catch(e){
    set({processing:false, err:'Error al procesar: '+e.message});
  }
}

async function activateExam(){
  const{exam,answerKey}=S;
  if(!exam||!answerKey) return;
  const examId='ex_'+Date.now();
  await sSet(SK.exam, JSON.stringify({...exam,examId}));
  await sSet(SK.akey, JSON.stringify({...answerKey,examId}));
  await new Promise(r=>setTimeout(r,200));
  await sSet(SK.mode,'exam');
  const raw=await sGet(SK.exhist); const hist=raw?JSON.parse(raw):[];
  hist.push({examId,title:exam.title||'Examen',date:new Date().toLocaleDateString('es-MX'),ts:Date.now()});
  await sSet(SK.exhist,JSON.stringify(hist));
  set({examActive:true,contentActive:false,examHistory:hist,ok:'¡Examen activado para todos los alumnos!'});
}

async function activateContent(){
  if(!S.contentHtml) return;
  await sSet(SK.content,JSON.stringify({html:S.contentHtml}));
  await new Promise(r=>setTimeout(r,200));
  await sSet(SK.mode,'content');
  set({contentActive:true,examActive:false,ok:'¡Contenido compartido con los alumnos!'});
}

async function deactivate(){
  await sSet(SK.mode,'idle');
  set({examActive:false,contentActive:false,quizActive:false,ok:'Actividad detenida'});
}

async function processContentFile(file){
  set({processing:true,err:'',ok:''});
  try{
    const html=await readDocx(file,'html');
    set({contentHtml:html,processing:false,ok:'✓ Documento listo para compartir'});
  }catch(e){ set({processing:false,err:'Error: '+e.message}); }
}

async function teacherLogin(pin){
  if(!S.savedPin){
    if(!pin||pin.length<4){set({err:'El PIN debe tener mínimo 4 caracteres'});return;}
    await sSet(SK.config,JSON.stringify({pin}));
    set({savedPin:pin,view:'teacher',err:''});
  }else{
    if(pin!==S.savedPin){set({err:'PIN incorrecto'});return;}
    set({view:'teacher',err:''});
  }
  loadTeacher();
}

async function loadTeacher(){
  try{
    const modeRaw=await sGet(SK.mode)||'idle';
    const grpRaw=await sGet(SK.groups);
    const histRaw=await sGet(SK.exhist);
    set({
      examActive:modeRaw==='exam',
      contentActive:modeRaw==='content',
      groups:grpRaw?JSON.parse(grpRaw):[],
      examHistory:histRaw?JSON.parse(histRaw):[]
    });
    await refreshResults(S.groupFilter);
  }catch(e){ set({err:'Error al cargar: '+e.message}); }
}

async function refreshResults(gf){
  gf=gf||'all';
  const idxRaw=await sGet(SK.idx(gf));
  const keys=idxRaw?JSON.parse(idxRaw):[];
  const list=[];
  for(const k of keys){ const r=await sGet(k); if(r)try{list.push(JSON.parse(r))}catch{} }
  set({results:list,groupFilter:gf});
}

async function addGroup(name){
  if(!name.trim()) return;
  const{groups}=S;
  if(groups.find(g=>g.name===name.trim())) return;
  const ng=[...groups,{id:'g_'+Date.now(),name:name.trim(),color:COLORS[groups.length%COLORS.length]}];
  await sSet(SK.groups,JSON.stringify(ng));
  set({groups:ng,ok:`Grupo "${name.trim()}" agregado`});
}

async function removeGroup(id){
  const ng=S.groups.filter(g=>g.id!==id);
  await sSet(SK.groups,JSON.stringify(ng));
  set({groups:ng});
}

async function clearResults(gf){
  const raw=await sGet(SK.idx(gf));
  if(raw){ const keys=JSON.parse(raw); for(const k of keys) await sDel(k); await sSet(SK.idx(gf),JSON.stringify([])); }
  if(gf!=='all'){
    const aRaw=await sGet(SK.idx('all')); if(aRaw){
      const removed=raw?JSON.parse(raw):[];
      await sSet(SK.idx('all'),JSON.stringify(JSON.parse(aRaw).filter(k=>!removed.includes(k))));
    }
  }
  await refreshResults(gf);
  set({ok:'Resultados eliminados'});
}



// ── Student logic ─────────────────────────────────────────────────────────
async function studentEnter(name,group){
  if(!name.trim()){set({err:'Escribe tu nombre completo'});return;}
  if(!group){set({err:'Selecciona o escribe tu grupo'});return;}
  const subKey=SK.sub(name,group);
  const existing=await sGet(subKey);
  if(existing){
    const sub=JSON.parse(existing);
    if(sub.submitted){set({view:'student',studentName:name,studentGroup:group,err:'',submitted:true,myScore:{correct:sub.correctCount,grade:sub.grade,details:sub.details||[]}});return;}
  }
  // Reset student state cleanly
  Object.assign(S,{view:'student',studentName:name,studentGroup:group,err:'',
    examActive:false,exam:null,contentActive:false,contentHtml:'',mode:'idle',
    pollCount:0,lastPoll:null});
  render();
  // First poll immediately (await so first paint shows correct state)
  await pollStudent();
  if(S.pollTimer)clearInterval(S.pollTimer);
  const t=setInterval(pollStudent,2000);
  S.pollTimer=t;
}


async function submitQuizResult(score,total,grade){
  const{studentName,studentGroup}=S;
  const subKey=SK.sub(studentName,studentGroup);
  const sub={name:studentName,group:studentGroup,correctCount:score,grade,
    details:[],examTitle:S.quizName||'Quiz',isQuiz:true,
    timestamp:new Date().toISOString(),submitted:true};
  await sSet(subKey,JSON.stringify(sub));
  const gRaw=await sGet(SK.idx(studentGroup));const gKeys=gRaw?JSON.parse(gRaw):[];
  if(!gKeys.includes(subKey)){gKeys.push(subKey);await sSet(SK.idx(studentGroup),JSON.stringify(gKeys));}
  const aRaw=await sGet(SK.idx('all'));const aKeys=aRaw?JSON.parse(aRaw):[];
  if(!aKeys.includes(subKey)){aKeys.push(subKey);await sSet(SK.idx('all'),JSON.stringify(aKeys));}
  if(S.pollTimer)clearInterval(S.pollTimer);
  set({myScore:{correct:score,grade,details:[]},submitted:true,pollTimer:null});
}

async function pollStudent(){
  if(!_db){
    await checkStorage();
    if(!_db){ S.pollCount++; S.lastPoll='sin conexion al servidor'; render(); return; }
  }
  try{
    const modeRaw = await sGet(SK.mode);
    const mode = modeRaw || 'idle';
    S.pollCount++; S.lastPoll=new Date().toLocaleTimeString('es-MX'); S.fbConnected=true;

    // --- NO re-render if already showing exam and mode hasn't changed ---
    if(mode==='exam' && S.examActive && S.exam){
      S.mode=mode; return; // alumno ya tiene el examen, no tocar el DOM
    }
    if(mode==='quiz' && S.quizActive && S.quizHtml){
      S.mode=mode; return; // alumno ya ve el quiz, no tocar el DOM
    }
    if(mode==='content' && S.contentActive && S.contentHtml){
      S.mode=mode; return; // alumno ya ve el contenido, no tocar el DOM
    }
    if(mode==='idle' && !S.examActive && !S.contentActive && !S.quizActive){
      // Solo actualizar el contador sin re-renderizar si ya estaba en espera
      const waitEl=document.querySelector('[data-poll-count]');
      if(waitEl){ waitEl.textContent='Revision #'+S.pollCount+' — '+S.lastPoll; return; }
    }

    // Mode changed or first load — full update + re-render
    const patch={mode, fbConnected:true};
    if(mode==='exam'){
      patch.examActive=true; patch.contentActive=false; patch.quizActive=false;
      const r=await sGet(SK.exam);
      if(r){ try{patch.exam=JSON.parse(r);}catch{patch.exam=S.exam;} }
      else{ patch.exam=S.exam; }
    } else if(mode==='content'){
      const r=await sGet(SK.content);
      if(r) patch.contentHtml=JSON.parse(r).html;
      patch.contentActive=true; patch.examActive=false; patch.exam=null; patch.quizActive=false;
    } else if(mode==='quiz'){
      const r=await sGet('quiz');
      if(r){ try{const d=JSON.parse(r);patch.quizHtml=d.html;patch.quizName=d.name||'Quiz';}catch{} }
      patch.quizActive=true; patch.examActive=false; patch.contentActive=false; patch.exam=null;
    } else {
      patch.examActive=false; patch.contentActive=false; patch.exam=null; patch.quizActive=false;
    }
    set(patch);
  }catch(e){
    S.pollCount++; S.lastPoll='error: '+e.message; S.fbConnected=false;
  }
}

async function submitExam(){
  const{exam,stuAnswers,studentName,studentGroup}=S;
  const keyRaw=await sGet(SK.akey);
  if(!keyRaw){set({err:'Error al obtener clave de respuestas. Intenta de nuevo.'});return;}
  const ak=JSON.parse(keyRaw);if(!exam)return;
  let correct=0;
  const details=(exam.questions||[]).map(q=>{
    const stu=stuAnswers[q.num]||'';
    const ans=(ak.answers||{})[String(q.num)]||'';
    if(stu===ans)correct++;
    return{num:q.num,student:stu,correct:ans,ok:stu===ans};
  });
  const grade=gradeTrunc(correct,20);
  const subKey=SK.sub(studentName,studentGroup);
  const sub={name:studentName,group:studentGroup,correctCount:correct,grade,details,examTitle:exam.title||'Examen',timestamp:new Date().toISOString(),submitted:true};
  await sSet(subKey,JSON.stringify(sub));
  const gRaw=await sGet(SK.idx(studentGroup));const gKeys=gRaw?JSON.parse(gRaw):[];
  if(!gKeys.includes(subKey)){gKeys.push(subKey);await sSet(SK.idx(studentGroup),JSON.stringify(gKeys));}
  const aRaw=await sGet(SK.idx('all'));const aKeys=aRaw?JSON.parse(aRaw):[];
  if(!aKeys.includes(subKey)){aKeys.push(subKey);await sSet(SK.idx('all'),JSON.stringify(aKeys));}
  if(S.pollTimer)clearInterval(S.pollTimer);
  set({myScore:{correct,grade,details},submitted:true,pollTimer:null});
}

  }
  uc.appendChild(hrow);

  qInput.addEventListener('change',e=>{qfile=e.target.files[0];});
  uc.appendChild(el('label',{},'Archivo HTML del quiz'));
  uc.appendChild(qInput);

  const btnRow=el('div',{css:{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'4px'}});

  const loadBtn=btn('Cargar y mostrar a alumnos','btn-success',async()=>{
    if(!qfile){set({err:'Selecciona un archivo .html primero'});return;}
    const reader=new FileReader();
    reader.onload=async ev=>{
      const htmlContent=ev.target.result;
      const name=qfile.name.replace(/\.html?$/i,'');
      // Write quiz data first, wait for confirmation, then set mode
      const quizOk = await sSet('quiz',JSON.stringify({html:htmlContent,name}));
      if(!quizOk){ set({err:'Error al guardar el quiz. Verifica que GAS_URL esta configurado.'}); return; }
      await new Promise(r=>setTimeout(r,500));
      await sSet(SK.mode,'quiz');
      set({quizActive:true,quizHtml:htmlContent,quizName:name,examActive:false,contentActive:false,
        ok:'Quiz "'+name+'" activo — los alumnos ya pueden verlo'});
    };
    reader.readAsText(qfile,'UTF-8');
  });
  btnRow.appendChild(loadBtn);

  if(S.quizHtml||S.quizActive){
    const clearBtn=btn('Eliminar quiz actual','btn-ghost',async()=>{
      await sSet('quiz','null');

    btnRow.appendChild(clearBtn);

function tabSettings(){
  const wrap=el('div',{});

  // JSON Export/Import card
  const jcard=el('div',{cls:'card'});
  jcard.appendChild(el('h3',{},'Exportar / Importar examen (JSON)'));
  jcard.appendChild(el('p',{cls:'sub',css:{marginBottom:'1rem'}},'Guarda el examen completo en un archivo JSON para reutilizarlo en otra sesión sin volver a capturarlo.'));

  const btnRow=el('div',{css:{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'1rem'}});

  // Export JSON
  const expBtn=btn('⬇ Exportar JSON','btn-primary',()=>{
    const{exam,answerKey}=S;
    if(!exam||!answerKey){set({err:'No hay examen cargado para exportar',tab:'settings'});return;}
    const bundle=JSON.stringify({version:2,exam,answerKey,exportDate:new Date().toISOString()},null,2);
    const blob=new Blob([bundle],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(exam.title||'examen').replace(/[^a-zA-Z0-9_\-\u00e1\u00e9\u00ed\u00f3\u00fa\u00c1\u00c9\u00cd\u00d3\u00da\u00f1\u00d1 ]/g,'_')+'.json';
    a.click(); URL.revokeObjectURL(a.href);
    set({ok:'Examen exportado como JSON',tab:'settings'});
  });
  btnRow.appendChild(expBtn);

  // Import JSON
  const impFile=el('input',{type:'file',accept:'.json'});
  impFile.style.display='none';
  impFile.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const bundle=JSON.parse(ev.target.result);
        if(!bundle.exam||!bundle.answerKey) throw new Error('Archivo inválido: falta exam o answerKey');
        if(!bundle.exam.questions||!bundle.exam.questions.length) throw new Error('El archivo no contiene preguntas');
        const mq=Array.from({length:20},(_,i)=>({num:i+1,text:'',a:'',b:'',c:'',d:'',correct:''}));
        bundle.exam.questions.forEach(q=>{
          const idx=q.num-1;
          if(idx>=0&&idx<20){
            mq[idx].text=q.text||''; mq[idx].a=q.options?.a||''; mq[idx].b=q.options?.b||'';
            mq[idx].c=q.options?.c||''; mq[idx].d=q.options?.d||'';
            mq[idx].correct=(bundle.answerKey.answers||{})[String(q.num)]||'';
          }
        });
        set({exam:bundle.exam,answerKey:bundle.answerKey,manualTitle:bundle.exam.title||'',
          manualQuestions:mq,ok:'✓ Importado: "'+bundle.exam.title+'" — '+bundle.exam.questions.length+' preguntas',
          err:'',tab:'settings'});
      }catch(err){ set({err:'Error al importar: '+err.message,tab:'settings'}); }
    };
    reader.readAsText(file,'UTF-8');
    impFile.value='';
  });
  const impBtn=btn('⬆ Importar JSON','btn-ghost',()=>impFile.click());
  btnRow.appendChild(impBtn);
  btnRow.appendChild(impFile);
  jcard.appendChild(btnRow);

  if(S.exam){
    const info=el('div',{css:{background:'var(--color-background-secondary)',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:'var(--color-text-secondary)'}});
    info.textContent='Examen cargado: "'+S.exam.title+'" — '+(S.exam.questions||[]).length+' preguntas';
    jcard.appendChild(info);
  }
  wrap.appendChild(jcard);

  // App info card
  const acard=el('div',{cls:'card'});
  acard.appendChild(el('h3',{},'Información'));
  const rows=[['URL del aula','https://mandrake210.github.io/aula-virtual'],
    ['Backend','Google Apps Script'],
    ['Versión','2.0 — GitHub Pages + Google Apps Script']];
  rows.forEach(([k,v])=>{
    const row=el('div',{css:{display:'flex',gap:'12px',padding:'8px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',fontSize:'13px'}});
    row.appendChild(el('div',{css:{color:'var(--color-text-secondary)',minWidth:'120px'}},k));
    row.appendChild(el('div',{css:{fontFamily:'var(--font-mono)',fontSize:'12px',wordBreak:'break-all'}},v));
    acard.appendChild(row);
  });
  wrap.appendChild(acard);
  return wrap;
}

function tabResults(){
  const wrap=el('div',{});

    gb.style.cssText=`font-size:12px;padding:5px 12px;${isA?`background:${g.color};color:#fff;border-color:${g.color};`:''}`;

  wrap.appendChild(fb);

  const sg=el('div',{cls:'grid4'});
  [{l:'Alumnos',v:String(results.length)},{l:'Promedio del grupo',v:avg.toFixed(1)},{l:'Aprobados',v:`${approved}/${results.length}`},{l:'Reprobados',v:`${results.length-approved}/${results.length}`}].forEach(m=>{
    const mc=el('div',{cls:'metric'});

  rh.appendChild(rl);
  rh.appendChild(btn('Borrar resultados','btn-danger',()=>clearResults(groupFilter)));
  rc.appendChild(rh);
  const tbl=el('table',{}); const thead=el('thead',{}); const tr=el('tr',{});
  ['#','Alumno','Grupo','Aciertos','Calificación','Estado'].forEach(hd=>tr.appendChild(el('th',{},hd)));
  thead.appendChild(tr); tbl.appendChild(thead);
  const tbody=el('tbody',{});
  [...results].sort((a,b)=>b.grade-a.grade).forEach((r,i)=>{
    const gc=groups.find(g=>g.name===r.group)?.color||'#888';
    const row=el('tr',{});
    row.appendChild(el('td',{css:{color:'var(--color-text-secondary)',fontSize:'12px'}},String(i+1)));
    row.appendChild(el('td',{css:{fontWeight:'500'}},r.name));
    const gtd=el('td',{});
    gtd.appendChild(el('span',{cls:'color-dot',css:{background:gc,marginRight:'6px',verticalAlign:'middle',display:'inline-block'}}));
    gtd.appendChild(document.createTextNode(r.group||'—')); row.appendChild(gtd);
    row.appendChild(el('td',{css:{color:'var(--color-text-secondary)'}},`${r.correctCount}/20`));
    row.appendChild(el('td',{css:{fontWeight:'500',fontSize:'15px',color:r.grade>=6?'#3B6D11':'#A32D2D'}},r.grade.toFixed(1)));
    const std=el('td',{}); std.appendChild(bdg(r.grade>=6?'Aprobado':'Reprobado',r.grade>=6?'green':'red'));
    row.appendChild(std); tbody.appendChild(row);
  });
  tbl.appendChild(tbody); rc.appendChild(tbl); wrap.appendChild(rc);

  const dc=el('div',{cls:'card'});
  dc.appendChild(el('h3',{},'Distribución de calificaciones'));
  [['0 – 5.9','#E24B4A',results.filter(r=>r.grade<6).length],['6 – 6.9','#EF9F27',results.filter(r=>r.grade>=6&&r.grade<7).length],['7 – 7.9','#378ADD',results.filter(r=>r.grade>=7&&r.grade<8).length],['8 – 8.9','#639922',results.filter(r=>r.grade>=8&&r.grade<9).length],['9 – 10','#7F77DD',results.filter(r=>r.grade>=9).length]].forEach(([label,color,cnt])=>{
    const pct=Math.round((cnt/results.length)*100);
    const row=el('div',{css:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}});

    const bw=el('div',{cls:'bar-wrap'}); bw.appendChild(el('div',{cls:'bar-fill',css:{width:pct+'%',background:color}})); row.appendChild(bw);
    row.appendChild(el('div',{css:{fontSize:'13px',fontWeight:'500',minWidth:'44px'}},`${cnt} (${pct}%)`));
    dc.appendChild(row);
  });
  wrap.appendChild(dc);

  if(groupFilter==='all'&&groups.length>1){
    const cmp=el('div',{cls:'card'});
    cmp.appendChild(el('h3',{},'Comparativo por grupo'));
    const cgrid=el('div',{css:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:'12px',marginTop:'8px'}});
    groups.forEach(g=>{
      const gRes=results.filter(r=>r.group===g.name); if(!gRes.length) return;
      const gAvg=Math.trunc((gRes.reduce((a,b)=>a+b.grade,0)/gRes.length)*10)/10;
      const mc=el('div',{css:{padding:'1rem',borderRadius:'8px',background:'var(--color-background-secondary)'}});
      const top=el('div',{css:{display:'flex',alignItems:'center',marginBottom:'8px'}});
      top.appendChild(el('span',{cls:'color-dot',css:{background:g.color,marginRight:'8px',width:'10px',height:'10px'}}));
      top.appendChild(el('span',{css:{fontWeight:'500',fontSize:'13px'}},g.name));
      mc.appendChild(top);
      mc.appendChild(el('div',{css:{fontSize:'22px',fontWeight:'500',color:gAvg>=6?'#3B6D11':'#A32D2D'}},gAvg.toFixed(1)));
      mc.appendChild(el('div',{css:{fontSize:'12px',color:'var(--color-text-secondary)',marginTop:'2px'}},`${gRes.length} alumnos · ${gRes.filter(r=>r.grade>=6).length} aprobados`));
      cgrid.appendChild(mc);
    });
    cmp.appendChild(cgrid); wrap.appendChild(cmp);
  }
  return wrap;
}

      + '.titulo-juego h1{font-size:1.4rem!important}'
      + '.btn-siguiente{font-size:1.4rem!important;padding:14px 24px!important}'
      + '#_enviar_btn{display:none;width:100%;margin-top:16px;padding:18px;font-size:1.4rem;font-weight:700;background:#3B6D11;color:white;border:none;border-radius:50px;cursor:pointer;border:4px solid white;box-shadow:0 8px 0 #1a3a07}'
      + '#_enviar_btn.visible{display:block}'
      + '<\/style>';

    var injectScript = '<scr'+'ipt>'
      + 'window.addEventListener("load",function(){'
      +   'var t=setInterval(function(){'
      +     'var b=document.getElementById("reiniciarBtn");'
      +     'if(b){'
      +       'clearInterval(t);'
      +       'b.textContent="Finalizar";'
      +       'b.style.background="#e63946";'
      +       'b.style.boxShadow="0 12px 0 #8f1a22";'
      +       'b.addEventListener("click",function(e){'
      +         'e.stopImmediatePropagation();'
      +         'var pts=document.getElementById("puntosValor");'
      +         'var score=pts?parseInt(pts.textContent)||0:0;'
      +         'document.getElementById("_enviar_btn").classList.add("visible");'
      +         'document.getElementById("_score_data").value=JSON.stringify({score:score,total:30});'
      +       '},{capture:true});'
      +     '}'
      +   '},300);'
      + '});'
      + 'document.addEventListener("DOMContentLoaded",function(){'
      +   'document.getElementById("_enviar_btn").addEventListener("click",function(){'
      +     'var raw=document.getElementById("_score_data").value||"{}";'
      +     'var d=JSON.parse(raw);'
      +     'window.parent.postMessage({type:"quiz_done",score:d.score||0,total:d.total||30},"*");'
      +   '});'
      + '});'
      + '<\/sc'+'ript>';

    var sendBtn = '<input type="hidden" id="_score_data" value="{}">'
      + '<button id="_enviar_btn">Enviar resultados al maestro<\/button>';

    var quizWithInject = S.quizHtml
      .replace('<\/head>', injectStyle + injectScript + '<\/head>')
      .replace('<\/body>', sendBtn + '<\/body>');

    var blob = new Blob([quizWithInject], {type:'text/html'});
    var url  = URL.createObjectURL(blob);
    var frame = document.createElement('iframe');
    frame.src = url;
    frame.style.cssText = 'width:100%;border:none;border-radius:12px;min-height:600px;display:block';
    frame.setAttribute('scrolling','yes');
    frame.onload = function(){
      URL.revokeObjectURL(url);
      try{
        var resize = function(){
          var h = frame.contentDocument.body.scrollHeight;
          if(h > 300) frame.style.height = (h+40) + 'px';
        };
        resize();
        frame.contentDocument.addEventListener('click', function(){ setTimeout(resize,400); });
      }catch(e){}
    };

    window.onmessage = function(ev){
      if(ev.data && ev.data.type === 'quiz_done'){
        submitQuizResult(ev.data.score||0, ev.data.total||30,
          Math.trunc((ev.data.score||0)/(ev.data.total||30)*100)/10);
      }
    };

    page.appendChild(el('div',{css:{marginBottom:'8px',display:'flex',alignItems:'center'}},
      el('h1',{},S.quizName||'Quiz')
    ));
    page.appendChild(frame);
    return page;
  }
  // Waiting for quiz data
  if(S.quizActive&&!S.quizHtml){
    const w=el('div',{css:{textAlign:'center',padding:'4rem 1rem'}});
    w.appendChild(el('div',{css:{fontSize:'36px',marginBottom:'1rem'},html:'&#127918;'}));
    w.appendChild(el('div',{css:{fontSize:'16px',fontWeight:'500',marginBottom:'6px'}},'Cargando quiz...'));
    w.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)'}},'El maestro activo un quiz. Un momento...'));
    page.appendChild(w); return page;
  }

  // Content view
  if(contentActive&&contentHtml){
    page.appendChild(el('h1',{css:{marginBottom:'1.5rem'}},'Material del maestro'));
    page.appendChild(el('div',{cls:'card',html:contentHtml}));
    return page;
  }

  // Exam view
  if(examActive&&exam){
    const answered=Object.keys(stuAnswers).length;
    const total=exam.questions?.length||20;
    const hdr=el('div',{css:{marginBottom:'1.5rem'}});
    hdr.appendChild(el('h1',{},exam.title||'Examen'));
    hdr.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)',marginTop:'4px'}},studentName+' · '+studentGroup+' · '+answered+'/'+total+' contestadas'));
    const pb=el('div',{css:{height:'4px',background:'var(--color-background-secondary)',borderRadius:'2px',marginTop:'8px'}});
    pb.appendChild(el('div',{css:{height:'4px',background:'#185FA5',borderRadius:'2px',width:((answered/total)*100)+'%',transition:'width .3s'}}));
    hdr.appendChild(pb);page.appendChild(hdr);
    (exam.questions||[]).forEach(q=>{
      const qc=el('div',{cls:'card',css:{marginBottom:'.75rem',padding:'1.25rem'}});
      qc.appendChild(el('div',{css:{fontSize:'14px',fontWeight:'500',marginBottom:'1rem'}},q.num+'. '+q.text));
      Object.entries(q.options||{}).forEach(([k,v])=>{
        const isSel=stuAnswers[q.num]===k;
        const lb=el('label',{cls:'opt-lbl'+(isSel?' sel':'')});
        const radio=el('input',{type:'radio',name:'q'+q.num,value:k});
        if(isSel)radio.checked=true;
        radio.addEventListener('change',()=>{S.stuAnswers={...S.stuAnswers,[q.num]:k};render();});
        lb.appendChild(radio);lb.appendChild(el('span',{},el('strong',{},k+') '),v));qc.appendChild(lb);
      });
      page.appendChild(qc);
    });
    const bar=el('div',{css:{position:'sticky',bottom:'.5rem',background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:'12px',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'1rem'}});
    bar.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)'}},
      answered<total?'Faltan '+(total-answered)+' por contestar':'¡Todas contestadas!'));
    const subBtn=btn('Entregar examen','btn-success',submitExam,answered<total);
    bar.appendChild(subBtn);page.appendChild(bar);
  }
  return page;
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  await checkStorage();
  try{
    const cfgRaw=await sGet(SK.config);
    if(cfgRaw){const c=JSON.parse(cfgRaw);if(c.pin)S.savedPin=c.pin;}
    const grpRaw=await sGet(SK.groups);
    if(grpRaw)S.groups=JSON.parse(grpRaw);
  }catch{}
  render();
}
init();
</script>
