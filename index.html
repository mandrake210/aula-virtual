<script>
// ── Storage keys ──────────────────────────────────────────────────────────
const SK = {
  config:  'config',
  exam:    'exam',
  akey:    'akey',
  content: 'content',
  mode:    'mode',
  groups:  'groups',
  exhist:  'exhist',
  idx:     g => 'idx_' + (g||'all').replace(/[.:]/g,'_'),
  sub:     (name, grp) => 'sub_' + btoa(unescape(encodeURIComponent((grp||'')+'||'+name))).replace(/[^a-zA-Z0-9]/g,'_').slice(0,50)
};

const COLORS = ['#185FA5','#3B6D11','#854F0B','#534AB7','#993556','#0F6E56','#993C1D'];

// ── Storage — local server API ──────────────────────────────────────────
// ── Firebase Realtime Database v8 ────────────────────────────────────────
// Solo necesitas esta URL — consiguela en Firebase Console > Realtime Database
const FB_DB_URL = "https://mi-aula-10abe-default-rtdb.firebaseio.com/";
// Ejemplo: "https://mi-clase-a1b2c-default-rtdb.firebaseio.com"

let _db = null;
let storageOK = false;

// Firebase no permite . # $ [ ] en rutas de datos
function fk(k){ return 'av/' + String(k).replace(/[.#$\[\]]/g,'_'); }

async function sGet(k){
  if(!_db) return null;
  try{
    const snap = await _db.ref(fk(k)).once('value');
    return snap.exists() ? snap.val() : null;
  }catch{ return null; }
}
async function sSet(k,v){
  if(!_db) return false;
  try{ await _db.ref(fk(k)).set(v); return true; }
  catch{ return false; }
}
async function sDel(k){
  if(!_db) return;
  try{ await _db.ref(fk(k)).remove(); }catch{}
}
async function checkStorage(){
  if(!FB_DB_URL || FB_DB_URL.includes('PEGA_AQUI')){
    console.warn('Aula Virtual: configura FB_DB_URL en el HTML');
    return;
  }
  try{
    if(!firebase.apps.length) firebase.initializeApp({ databaseURL: FB_DB_URL });
    _db = firebase.database();
    await _db.ref('_ping').set(Date.now());
    storageOK = true;
  }catch(e){
    storageOK = false;
    console.error('Firebase error:', e.message);
  }
}

// ── DOCX reader ───────────────────────────────────────────────────────────
function readDocx(file, mode){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=async e=>{
      try{
        const fn=mode==='html'?mammoth.convertToHtml:mammoth.extractRawText;
        const result=await fn({arrayBuffer:e.target.result});
        res(result.value);
      }catch(err){rej(err)}
    };
    r.readAsArrayBuffer(file);
  });
}


// ── EXAM PARSER (pure JS, no API needed) ─────────────────────────────────
function parseExamText(text){
  // Normalize: remove ** bold markers, collapse whitespace
  const clean = text.replace(/\*\*/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = clean.split('\n').map(l=>l.trim()).filter(l=>l.length>0);

  // Try to find a title (first line that doesn't look like a question/option)
  let title = 'Examen';
  for(const l of lines){
    if(!/^\d+[\.\)]\s/.test(l) && !/^[a-dA-D][\.\)]\s/.test(l) && l.length>5 && l.length<120){
      title = l; break;
    }
  }

  const questions = [];
  let currentQ = null;

  for(const line of lines){
    // Match question: starts with number followed by . or )
    const qMatch = line.match(/^(\d{1,2})[\.\)]\s+(.+)/);
    if(qMatch){
      if(currentQ && currentQ.text) questions.push(currentQ);
      currentQ = { num: parseInt(qMatch[1]), text: qMatch[2].trim(), options: {} };
      continue;
    }
    // Match option: starts with a/b/c/d followed by ) or .
    const oMatch = line.match(/^([a-dA-D])[\.\)]\s+(.+)/);
    if(oMatch && currentQ){
      currentQ.options[oMatch[1].toLowerCase()] = oMatch[2].trim();
      continue;
    }
    // Continuation of question text
    if(currentQ && !currentQ.options.a && line.length > 2){
      currentQ.text += ' ' + line;
    }
  }
  if(currentQ && currentQ.text) questions.push(currentQ);

  return { title, questions };
}

function parseAnswerKeyText(text){
  const clean = text.replace(/\*\*/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = clean.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const answers = {};

  for(const line of lines){
    // Pattern 1: "1  b)  Explanation..." or "1   b)..."
    const p1 = line.match(/^(\d{1,2})\s+([a-dA-D])[\.\)]/);
    if(p1){ answers[p1[1]] = p1[2].toLowerCase(); continue; }

    // Pattern 2: "1) b)" or "1. b)"
    const p2 = line.match(/^(\d{1,2})[\.\)]\s+([a-dA-D])[\.\)]/);
    if(p2){ answers[p2[1]] = p2[2].toLowerCase(); continue; }

    // Pattern 3: cells separated by tabs "1\tb\tExplanation"
    const p3 = line.match(/^(\d{1,2})\t([a-dA-D])[\.\)]?/);
    if(p3){ answers[p3[1]] = p3[2].toLowerCase(); continue; }

    // Pattern 4: inline "pregunta 1: b" or "1: b"
    const p4 = line.match(/(?:pregunta\s+)?(\d{1,2})\s*[:=]\s*([a-dA-D])/i);
    if(p4){ answers[p4[1]] = p4[2].toLowerCase(); continue; }

    // Pattern 5: table row with answer in second column (space-separated)
    const p5 = line.match(/^(\d{1,3})\s+([a-dA-D])\)?/);
    if(p5){ answers[p5[1]] = p5[2].toLowerCase(); continue; }
  }

  return { answers };
}


function gradeTrunc(correct,total){return Math.trunc((correct/total)*100)/10;}


// ── Excel export / import ─────────────────────────────────────────────────
function exportExcel(){
  const{exam,answerKey}=S;
  if(!exam||!answerKey){set({err:'No hay examen cargado para exportar'});return;}
  const wb=XLSX.utils.book_new();
  const rows=[
    ['AULA VIRTUAL — EXAMEN'],
    ['Título:',exam.title||''],
    ['Exportado:',new Date().toLocaleString('es-MX')],
    ['Preguntas:',(exam.questions||[]).length],
    [],
    ['#','Pregunta','Opción A','Opción B','Opción C','Opción D','Respuesta Correcta']
  ];
  (exam.questions||[]).forEach(q=>{
    const ans=(answerKey.answers||{})[String(q.num)]||'';
    rows.push([q.num,q.text||'',q.options?.a||'',q.options?.b||'',q.options?.c||'',q.options?.d||'',ans.toUpperCase()]);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:60},{wch:30},{wch:30},{wch:30},{wch:30},{wch:12}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];
  XLSX.utils.book_append_sheet(wb,ws,'Examen');
  XLSX.writeFile(wb,(exam.title||'examen').replace(/[^a-zA-Z0-9_\-áéíóúÁÉÍÓÚñÑ ]/g,'_')+'.xlsx');
}

function importExcel(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let headerIdx=-1;
      for(let i=0;i<rows.length;i++){
        if(rows[i]&&(String(rows[i][0]).trim()==='#'||String(rows[i][1]).toLowerCase().includes('pregunta'))){headerIdx=i;break;}
      }
      if(headerIdx===-1)throw new Error('No se encontró la fila de encabezados (#, Pregunta...)');
      let title='Examen';
      for(let i=0;i<headerIdx;i++){
        if(rows[i]&&String(rows[i][0]).toLowerCase().includes('t')){
          const v=String(rows[i][1]||'');
          if(v&&v.length>1&&!v.includes('/')){title=v;break;}
        }
      }
      const questions=[];const answers={};
      for(let i=headerIdx+1;i<rows.length;i++){
        const row=rows[i];
        if(!row||!row[0])continue;
        const num=parseInt(String(row[0]));
        if(isNaN(num))continue;
        const q={num,text:String(row[1]||'').trim(),options:{a:String(row[2]||'').trim(),b:String(row[3]||'').trim(),c:String(row[4]||'').trim(),d:String(row[5]||'').trim()}};
        const ans=String(row[6]||'').trim().toLowerCase();
        if(q.text){questions.push(q);if(ans)answers[String(num)]=ans;}
      }
      if(questions.length===0)throw new Error('No se encontraron preguntas en el archivo.');
      const mq=Array.from({length:20},(_,i)=>({num:i+1,text:'',a:'',b:'',c:'',d:'',correct:''}));
      questions.forEach(q=>{const idx=q.num-1;if(idx>=0&&idx<20){mq[idx].text=q.text;mq[idx].a=q.options.a;mq[idx].b=q.options.b;mq[idx].c=q.options.c;mq[idx].d=q.options.d;mq[idx].correct=answers[String(q.num)]||'';}});
      set({exam:{title,questions},answerKey:{answers},manualTitle:title,manualQuestions:mq,
        ok:'✓ Importado: "'+title+'" — '+questions.length+' preguntas',err:''});
    }catch(err){set({err:'Error al importar: '+err.message});}
  };
  r.readAsArrayBuffer(file);
}

// ── Manual/Paste exam builders ────────────────────────────────────────────
function buildExamFromManual(){
  const{manualTitle,manualQuestions}=S;
  if(!manualTitle.trim()){set({err:'Escribe el título del examen'});return;}
  const filled=manualQuestions.filter(q=>q.text.trim()&&q.a&&q.b&&q.c&&q.d&&q.correct);
  if(filled.length<1){set({err:'Completa al menos una pregunta con opciones y respuesta correcta'});return;}
  const incomplete=manualQuestions.filter(q=>q.text.trim()&&(!q.a||!q.b||!q.c||!q.d||!q.correct));
  if(incomplete.length>0){set({err:'Pregunta '+incomplete[0].num+': faltan opciones o respuesta correcta'});return;}
  const questions=filled.map(q=>({num:q.num,text:q.text.trim(),options:{a:q.a.trim(),b:q.b.trim(),c:q.c.trim(),d:q.d.trim()}}));
  const answers=Object.fromEntries(filled.map(q=>[String(q.num),q.correct]));
  set({exam:{title:manualTitle.trim(),questions},answerKey:{answers},err:'',ok:'✓ Examen listo: '+questions.length+' preguntas'});
}

function buildExamFromPaste(){
  const{pasteExam,pasteKey}=S;
  if(!pasteExam.trim()){set({err:'Pega el texto del examen'});return;}
  if(!pasteKey.trim()){set({err:'Pega las respuestas correctas'});return;}
  const ep=parseExamText(pasteExam);const kp=parseAnswerKeyText(pasteKey);
  if(!ep.questions||ep.questions.length===0){set({err:'No se encontraron preguntas. Formato: "1. Pregunta" + "a) Opción"'});return;}
  if(!kp.answers||Object.keys(kp.answers).length===0){set({err:'Formato respuestas: "1 b)" o "1. b)" o "1: b"'});return;}
  set({exam:ep,answerKey:kp,err:'',ok:'✓ '+ep.questions.length+' preguntas extraídas'});
}


// ── App State ─────────────────────────────────────────────────────────────
let S = {
  view:'landing', savedPin:null, tab:'exam',
  exam:null, answerKey:null,
  examActive:false, contentHtml:'', contentActive:false,
  groups:[], results:[], examHistory:[], groupFilter:'all',
  processing:false, err:'', ok:'',
  studentName:'', studentGroup:'', mode:'idle',
  stuAnswers:{}, submitted:false, myScore:null, pollTimer:null,
  lastPoll:null, pollCount:0,
  examInputMode:'manual',
  manualTitle:'',
  manualQuestions:Array.from({length:20},(_,i)=>({num:i+1,text:'',a:'',b:'',c:'',d:'',correct:''})),
  pasteExam:'', pasteKey:'',
  quizHtml:null, quizActive:false, quizName:''
};

function set(patch){ Object.assign(S,patch); render(); }

// ── DOM helpers ───────────────────────────────────────────────────────────
function el(tag, attrs, ...kids){
  const node=document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(k==='cls') node.className=v;
    else if(k[0]==='$') node.addEventListener(k.slice(1),v);
    else if(k==='css'&&typeof v==='object') Object.assign(node.style,v);
    else if(k==='html') node.innerHTML=v;
    else if(k==='dis'&&v) node.disabled=true;
    else if(k!=='dis') node.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{ if(c==null||c===false)return; node.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return node;
}
function btn(text,cls,onClick,disabled){
  const b=el('button',{cls,dis:disabled}); b.textContent=text;
  b.addEventListener('click',onClick); return b;
}
function tinp(ph,type,onInput,onEnter){
  const i=document.createElement('input'); i.type=type||'text'; i.placeholder=ph;
  i.addEventListener('input',e=>onInput&&onInput(e.target.value));
  i.addEventListener('keydown',e=>e.key==='Enter'&&onEnter&&onEnter());
  return i;
}
function tsel(options,value,onChange){
  const s=document.createElement('select');
  options.forEach(([v,l])=>{ const o=document.createElement('option'); o.value=v; o.textContent=l; if(v===value)o.selected=true; s.appendChild(o); });
  s.addEventListener('change',e=>onChange(e.target.value)); return s;
}
function bdg(text,color){ return el('span',{cls:'badge bg-'+color},text); }
function lbl(text){ return el('label',{},text); }


// ── Data functions ────────────────────────────────────────────────────────
async function processExam(examFile, keyFile){
  set({processing:true, err:'', ok:''});
  try{
    const [examTxt, keyTxt] = await Promise.all([
      readDocx(examFile,'text'),
      readDocx(keyFile,'text')
    ]);
    const examParsed = parseExamText(examTxt);
    const keyParsed  = parseAnswerKeyText(keyTxt);

    if(!examParsed.questions || examParsed.questions.length===0)
      throw new Error('No se encontraron preguntas. Verifica el formato del archivo.');
    if(!keyParsed.answers || Object.keys(keyParsed.answers).length===0)
      throw new Error('No se encontraron respuestas. Verifica el formato de la hoja de respuestas.');

    set({
      exam: examParsed,
      answerKey: keyParsed,
      rawExamPreview: examTxt.slice(0,500),
      rawKeyPreview: keyTxt.slice(0,300),
      processing: false,
      ok: `✓ ${examParsed.questions.length} preguntas y ${Object.keys(keyParsed.answers).length} respuestas extraídas correctamente`
    });
  }catch(e){
    set({processing:false, err:'Error al procesar: '+e.message});
  }
}

async function activateExam(){
  const{exam,answerKey}=S;
  if(!exam||!answerKey) return;
  const examId='ex_'+Date.now();
  await sSet(SK.exam, JSON.stringify({...exam,examId}));
  await sSet(SK.akey, JSON.stringify({...answerKey,examId}));
  await new Promise(r=>setTimeout(r,200));
  await sSet(SK.mode,'exam');
  const raw=await sGet(SK.exhist); const hist=raw?JSON.parse(raw):[];

async function loadTeacher(){
  try{

async function refreshResults(gf){
  gf=gf||'all';
  const idxRaw=await sGet(SK.idx(gf));
  const keys=idxRaw?JSON.parse(idxRaw):[];
  const list=[];
  for(const k of keys){ const r=await sGet(k); if(r)try{list.push(JSON.parse(r))}catch{} }
  set({results:list,groupFilter:gf});
}

async function addGroup(name){
  if(!name.trim()) return;
  const{groups}=S;
  if(groups.find(g=>g.name===name.trim())) return;
  const ng=[...groups,{id:'g_'+Date.now(),name:name.trim(),color:COLORS[groups.length%COLORS.length]}];
  await sSet(SK.groups,JSON.stringify(ng));
  set({groups:ng,ok:`Grupo "${name.trim()}" agregado`});
}

async function removeGroup(id){
  const ng=S.groups.filter(g=>g.id!==id);
  await sSet(SK.groups,JSON.stringify(ng));
  set({groups:ng});
}

async function clearResults(gf){
  const raw=await sGet(SK.idx(gf));
  if(raw){ const keys=JSON.parse(raw); for(const k of keys) await sDel(k); await sSet(SK.idx(gf),JSON.stringify([])); }
  if(gf!=='all'){
    const aRaw=await sGet(SK.idx('all')); if(aRaw){
      const removed=raw?JSON.parse(raw):[];
      await sSet(SK.idx('all'),JSON.stringify(JSON.parse(aRaw).filter(k=>!removed.includes(k))));
    }
  }
  await refreshResults(gf);
  set({ok:'Resultados eliminados'});
}



// ── Student logic ─────────────────────────────────────────────────────────
async function studentEnter(name,group){
  if(!name.trim()){set({err:'Escribe tu nombre completo'});return;}
  if(!group){set({err:'Selecciona o escribe tu grupo'});return;}
  const subKey=SK.sub(name,group);
  const existing=await sGet(subKey);
  if(existing){
    const sub=JSON.parse(existing);
    if(sub.submitted){set({view:'student',studentName:name,studentGroup:group,err:'',submitted:true,myScore:{correct:sub.correctCount,grade:sub.grade,details:sub.details||[]}});return;}
  }
  // Reset student state cleanly
  Object.assign(S,{view:'student',studentName:name,studentGroup:group,err:'',
    examActive:false,exam:null,contentActive:false,contentHtml:'',mode:'idle',
    pollCount:0,lastPoll:null});
  render();
  // First poll immediately (await so first paint shows correct state)
  await pollStudent();
  if(S.pollTimer)clearInterval(S.pollTimer);
  const t=setInterval(pollStudent,2000);
  S.pollTimer=t;
}

async function pollStudent(){
  try{
    const mode=(await sGet(SK.mode))||'idle';
    const now=new Date().toLocaleTimeString('es-MX');
    const patch={mode,lastPoll:now,pollCount:S.pollCount+1};

    if(mode==='exam'){
      patch.examActive=true;
      patch.contentActive=false;
      // Always re-fetch exam data
      const r=await sGet(SK.exam);
      if(r){
        try{patch.exam=JSON.parse(r);}catch{patch.exam=S.exam;}
      } else {
        patch.exam=S.exam; // keep whatever we have while waiting
      }
    } else if(mode==='content'){
      const r=await sGet(SK.content);
      if(r)patch.contentHtml=JSON.parse(r).html;
      patch.contentActive=true;
      patch.examActive=false;
      patch.exam=null;
      patch.quizActive=false;
    } else if(mode==='quiz'){
      const r=await sGet('quiz');
      if(r){const d=JSON.parse(r);patch.quizHtml=d.html;patch.quizName=d.name||'Quiz';}
      patch.quizActive=true;
      patch.examActive=false;
      patch.contentActive=false;
      patch.exam=null;
    } else {
      patch.examActive=false;
      patch.contentActive=false;
      patch.exam=null;
      patch.quizActive=false;
    }
    set(patch);
  }catch(e){
    S.pollCount++;S.lastPoll='err';
  }
}

async function submitExam(){
  const{exam,stuAnswers,studentName,studentGroup}=S;
  const keyRaw=await sGet(SK.akey);
  if(!keyRaw){set({err:'Error al obtener clave de respuestas. Intenta de nuevo.'});return;}
  const ak=JSON.parse(keyRaw);if(!exam)return;
  let correct=0;
  const details=(exam.questions||[]).map(q=>{
    const stu=stuAnswers[q.num]||'';
    const ans=(ak.answers||{})[String(q.num)]||'';
    if(stu===ans)correct++;
    return{num:q.num,student:stu,correct:ans,ok:stu===ans};
  });
  const grade=gradeTrunc(correct,20);
  const subKey=SK.sub(studentName,studentGroup);
  const sub={name:studentName,group:studentGroup,correctCount:correct,grade,details,examTitle:exam.title||'Examen',timestamp:new Date().toISOString(),submitted:true};
  await sSet(subKey,JSON.stringify(sub));
  const gRaw=await sGet(SK.idx(studentGroup));const gKeys=gRaw?JSON.parse(gRaw):[];
  if(!gKeys.includes(subKey)){gKeys.push(subKey);await sSet(SK.idx(studentGroup),JSON.stringify(gKeys));}
  const aRaw=await sGet(SK.idx('all'));const aKeys=aRaw?JSON.parse(aRaw):[];
  if(!aKeys.includes(subKey)){aKeys.push(subKey);await sSet(SK.idx('all'),JSON.stringify(aKeys));}
  if(S.pollTimer)clearInterval(S.pollTimer);
  set({myScore:{correct,grade,details},submitted:true,pollTimer:null});
}

function tabResults(){
  const wrap=el('div',{});
  const{results,groups,groupFilter}=S;

  const fb=el('div',{css:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'1rem',alignItems:'center'}});
  fb.appendChild(el('span',{css:{fontSize:'12px',color:'var(--color-text-secondary)',marginRight:'2px'}},'Grupo:'));

  ab.style.cssText='font-size:12px;padding:5px 12px'; fb.appendChild(ab);
  groups.forEach(g=>{
    const isA=groupFilter===g.id;
    const gb=btn(g.name,'btn-ghost',()=>refreshResults(g.id));
    gb.style.cssText=`font-size:12px;padding:5px 12px;${isA?`background:${g.color};color:#fff;border-color:${g.color};`:''}`;
    fb.appendChild(gb);
  });
  const rb=btn('↻','btn-ghost',()=>refreshResults(groupFilter));
  rb.style.cssText='font-size:12px;padding:5px 10px;margin-left:auto'; fb.appendChild(rb);
  wrap.appendChild(fb);
  const groupName=groupFilter==='all'?'Todos los grupos':groups.find(g=>g.id===groupFilter)?.name||groupFilter;

  if(results.length===0){
    const empty=el('div',{cls:'card',css:{textAlign:'center',padding:'3rem'}});
    empty.appendChild(el('div',{css:{fontSize:'36px',marginBottom:'12px'},html:'&#128235;'}));

    wrap.appendChild(empty); return wrap;
  }

  const approved=results.filter(r=>r.grade>=6).length;
  const avg=Math.trunc((results.reduce((a,b)=>a+b.grade,0)/results.length)*10)/10;
  const highest=Math.max(...results.map(r=>r.grade));
  const lowest=Math.min(...results.map(r=>r.grade));

  const sg=el('div',{cls:'grid4'});
  [{l:'Alumnos',v:String(results.length)},{l:'Promedio del grupo',v:avg.toFixed(1)},{l:'Aprobados',v:`${approved}/${results.length}`},{l:'Reprobados',v:`${results.length-approved}/${results.length}`}].forEach(m=>{
    const mc=el('div',{cls:'metric'});
    mc.appendChild(el('div',{cls:'metric-lbl'},m.l));
    mc.appendChild(el('div',{cls:'metric-val'},m.v));
    sg.appendChild(mc);
  });
  wrap.appendChild(sg); wrap.appendChild(el('div',{css:{height:'1rem'}}));

  const rc=el('div',{cls:'card'});
  const rh=el('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem',flexWrap:'wrap',gap:'8px'}});

  rl.appendChild(el('h3',{css:{marginBottom:'2px'}},'Reporte: '+groupName));
  rl.appendChild(el('div',{css:{fontSize:'12px',color:'var(--color-text-secondary)'}},'Más alta: '+highest.toFixed(1)+'  ·  Más baja: '+lowest.toFixed(1)));
  rh.appendChild(rl);
  rh.appendChild(btn('Borrar resultados','btn-danger',()=>clearResults(groupFilter)));
  rc.appendChild(rh);
  const tbl=el('table',{}); const thead=el('thead',{}); const tr=el('tr',{});
  ['#','Alumno','Grupo','Aciertos','Calificación','Estado'].forEach(hd=>tr.appendChild(el('th',{},hd)));
  thead.appendChild(tr); tbl.appendChild(thead);
  const tbody=el('tbody',{});
  [...results].sort((a,b)=>b.grade-a.grade).forEach((r,i)=>{
    const gc=groups.find(g=>g.name===r.group)?.color||'#888';
    const row=el('tr',{});
    row.appendChild(el('td',{css:{color:'var(--color-text-secondary)',fontSize:'12px'}},String(i+1)));
    row.appendChild(el('td',{css:{fontWeight:'500'}},r.name));
    const gtd=el('td',{});
    gtd.appendChild(el('span',{cls:'color-dot',css:{background:gc,marginRight:'6px',verticalAlign:'middle',display:'inline-block'}}));
    gtd.appendChild(document.createTextNode(r.group||'—')); row.appendChild(gtd);
    row.appendChild(el('td',{css:{color:'var(--color-text-secondary)'}},`${r.correctCount}/20`));
    row.appendChild(el('td',{css:{fontWeight:'500',fontSize:'15px',color:r.grade>=6?'#3B6D11':'#A32D2D'}},r.grade.toFixed(1)));
    const std=el('td',{}); std.appendChild(bdg(r.grade>=6?'Aprobado':'Reprobado',r.grade>=6?'green':'red'));
    row.appendChild(std); tbody.appendChild(row);
  });
  tbl.appendChild(tbody); rc.appendChild(tbl); wrap.appendChild(rc);

  const dc=el('div',{cls:'card'});
  dc.appendChild(el('h3',{},'Distribución de calificaciones'));
  [['0 – 5.9','#E24B4A',results.filter(r=>r.grade<6).length],['6 – 6.9','#EF9F27',results.filter(r=>r.grade>=6&&r.grade<7).length],['7 – 7.9','#378ADD',results.filter(r=>r.grade>=7&&r.grade<8).length],['8 – 8.9','#639922',results.filter(r=>r.grade>=8&&r.grade<9).length],['9 – 10','#7F77DD',results.filter(r=>r.grade>=9).length]].forEach(([label,color,cnt])=>{
    const pct=Math.round((cnt/results.length)*100);
    const row=el('div',{css:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}});
    row.appendChild(el('div',{css:{fontSize:'12px',color:'var(--color-text-secondary)',width:'56px',textAlign:'right'}},label));
    const bw=el('div',{cls:'bar-wrap'}); bw.appendChild(el('div',{cls:'bar-fill',css:{width:pct+'%',background:color}})); row.appendChild(bw);
    row.appendChild(el('div',{css:{fontSize:'13px',fontWeight:'500',minWidth:'44px'}},`${cnt} (${pct}%)`));
    dc.appendChild(row);
  });
  wrap.appendChild(dc);

  if(groupFilter==='all'&&groups.length>1){
    const cmp=el('div',{cls:'card'});
    cmp.appendChild(el('h3',{},'Comparativo por grupo'));
    const cgrid=el('div',{css:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:'12px',marginTop:'8px'}});
    groups.forEach(g=>{
      const gRes=results.filter(r=>r.group===g.name); if(!gRes.length) return;
      const gAvg=Math.trunc((gRes.reduce((a,b)=>a+b.grade,0)/gRes.length)*10)/10;
      const mc=el('div',{css:{padding:'1rem',borderRadius:'8px',background:'var(--color-background-secondary)'}});
      const top=el('div',{css:{display:'flex',alignItems:'center',marginBottom:'8px'}});
      top.appendChild(el('span',{cls:'color-dot',css:{background:g.color,marginRight:'8px',width:'10px',height:'10px'}}));
      top.appendChild(el('span',{css:{fontWeight:'500',fontSize:'13px'}},g.name));
      mc.appendChild(top);
      mc.appendChild(el('div',{css:{fontSize:'22px',fontWeight:'500',color:gAvg>=6?'#3B6D11':'#A32D2D'}},gAvg.toFixed(1)));
      mc.appendChild(el('div',{css:{fontSize:'12px',color:'var(--color-text-secondary)',marginTop:'2px'}},`${gRes.length} alumnos · ${gRes.filter(r=>r.grade>=6).length} aprobados`));
      cgrid.appendChild(mc);
    });
    cmp.appendChild(cgrid); wrap.appendChild(cmp);
  }
  return wrap;
}

function renderStudent(){
  const{studentName,studentGroup,submitted,myScore,examActive,exam,stuAnswers,contentActive,contentHtml,lastPoll,pollCount}=S;
  const page=el('div',{cls:'page'});

  if(submitted&&myScore){
    const sc=el('div',{cls:'card',css:{maxWidth:'600px',margin:'0 auto',textAlign:'center',padding:'2.5rem'}});

    sc.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)',marginBottom:'1.5rem'}},'Examen entregado'));
    sc.appendChild(el('div',{css:{fontSize:'72px',fontWeight:'500',lineHeight:'1',color:myScore.grade>=6?'#3B6D11':'#A32D2D',marginBottom:'8px'}},myScore.grade.toFixed(1)));

    page.appendChild(sc);
    if(myScore.details?.length>0){
      const rc=el('div',{cls:'card',css:{maxWidth:'600px',margin:'1rem auto 0'}});
      rc.appendChild(el('h3',{},'Revisión de respuestas'));
      myScore.details.forEach(d=>{
        const row=el('div',{css:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',fontSize:'13px'}});
        row.appendChild(el('span',{css:{display:'inline-block',padding:'3px 10px',borderRadius:'6px',fontSize:'12px',fontWeight:'500',background:d.ok?'#EAF3DE':'#FCEBEB',color:d.ok?'#3B6D11':'#A32D2D'}},String(d.num)));
        row.appendChild(el('span',{css:{fontSize:'13px',color:'var(--color-text-secondary)',flex:'1'}},'Tu respuesta: '+(d.student||'—')+'   ·   Correcta: '+d.correct));
        row.appendChild(el('span',{css:{fontSize:'14px',color:d.ok?'#3B6D11':'#A32D2D'}},d.ok?'✓':'✗'));
        rc.appendChild(row);
      });
      page.appendChild(rc);
    }
    return page;
  }

  // Waiting screen
  if(!examActive&&!contentActive){
    const w=el('div',{css:{textAlign:'center',padding:'4rem 1rem'}});
    w.appendChild(el('div',{css:{fontSize:'42px',marginBottom:'1rem'},html:'&#8987;'}));
    w.appendChild(el('div',{css:{fontSize:'18px',fontWeight:'500',marginBottom:'4px'}},'Hola, '+studentName));
    w.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)',marginBottom:'1.5rem'}},studentGroup));
    w.appendChild(el('div',{css:{color:'var(--color-text-secondary)',fontSize:'14px',marginBottom:'1.5rem'}},'Esperando que el maestro inicie una actividad…'));
    const rfBtn=btn('↻ Actualizar ahora','btn-ghost',async()=>{ await pollStudent(); });
    rfBtn.style.cssText='font-size:12px;padding:6px 14px;margin-bottom:.75rem';
    w.appendChild(rfBtn);
    if(pollCount>0&&lastPoll){
      w.appendChild(el('div',{css:{fontSize:'11px',color:'var(--color-text-secondary)',opacity:'0.6'}},
        'Actualización automática cada 2s · Última: '+lastPoll+' (#'+pollCount+')'));
    }else{
      w.appendChild(el('div',{css:{fontSize:'11px',color:'var(--color-text-secondary)',opacity:'0.6'}},'Iniciando conexión…'));
    }
    page.appendChild(w);return page;
  }

  // Exam loading (mode=exam but data not yet arrived)
  if(examActive&&!exam){
    const w=el('div',{css:{textAlign:'center',padding:'4rem 1rem'}});
    w.appendChild(el('div',{css:{fontSize:'36px',marginBottom:'1rem'},html:'&#128196;'}));
    w.appendChild(el('div',{css:{fontSize:'16px',fontWeight:'500',marginBottom:'6px'}},'Cargando examen…'));
    w.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)',marginBottom:'1rem'}},'El maestro activó el examen. Descargando preguntas…'));
    w.appendChild(el('div',{css:{fontSize:'11px',color:'var(--color-text-secondary)',opacity:'0.6'}},'Intento #'+pollCount+' — cada 2 segundos'));
    page.appendChild(w);return page;
  }

  // Quiz view
  if(S.quizActive&&S.quizHtml){
    const blob=new Blob([S.quizHtml],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const frame=document.createElement('iframe');
    frame.src=url; frame.style.cssText='width:100%;height:90vh;border:none;border-radius:12px';
    frame.onload=()=>URL.revokeObjectURL(url);
    page.appendChild(el('div',{css:{marginBottom:'8px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      el('h1',{},S.quizName||'Quiz'),
      el('div',{css:{fontSize:'11px',color:'var(--color-text-secondary)'}},'Se actualiza cada 2s')
    ));
    page.appendChild(frame);
    return page;
  }

  // Waiting for quiz data
  if(S.quizActive&&!S.quizHtml){
    const w=el('div',{css:{textAlign:'center',padding:'4rem 1rem'}});
    w.appendChild(el('div',{css:{fontSize:'36px',marginBottom:'1rem'},html:'&#127918;'}));
    w.appendChild(el('div',{css:{fontSize:'16px',fontWeight:'500',marginBottom:'6px'}},'Cargando quiz...'));
    w.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)'}},'El maestro activo un quiz. Un momento...'));
    page.appendChild(w); return page;
  }

  // Content view
  if(contentActive&&contentHtml){
    page.appendChild(el('h1',{css:{marginBottom:'1.5rem'}},'Material del maestro'));
    page.appendChild(el('div',{cls:'card',html:contentHtml}));
    return page;
  }

  // Exam view
  if(examActive&&exam){
    const answered=Object.keys(stuAnswers).length;
    const total=exam.questions?.length||20;
    const hdr=el('div',{css:{marginBottom:'1.5rem'}});
    hdr.appendChild(el('h1',{},exam.title||'Examen'));
    hdr.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)',marginTop:'4px'}},studentName+' · '+studentGroup+' · '+answered+'/'+total+' contestadas'));
    const pb=el('div',{css:{height:'4px',background:'var(--color-background-secondary)',borderRadius:'2px',marginTop:'8px'}});
    pb.appendChild(el('div',{css:{height:'4px',background:'#185FA5',borderRadius:'2px',width:((answered/total)*100)+'%',transition:'width .3s'}}));
    hdr.appendChild(pb);page.appendChild(hdr);
    (exam.questions||[]).forEach(q=>{
      const qc=el('div',{cls:'card',css:{marginBottom:'.75rem',padding:'1.25rem'}});
      qc.appendChild(el('div',{css:{fontSize:'14px',fontWeight:'500',marginBottom:'1rem'}},q.num+'. '+q.text));
      Object.entries(q.options||{}).forEach(([k,v])=>{
        const isSel=stuAnswers[q.num]===k;
        const lb=el('label',{cls:'opt-lbl'+(isSel?' sel':'')});
        const radio=el('input',{type:'radio',name:'q'+q.num,value:k});
        if(isSel)radio.checked=true;
        radio.addEventListener('change',()=>{S.stuAnswers={...S.stuAnswers,[q.num]:k};render();});
        lb.appendChild(radio);lb.appendChild(el('span',{},el('strong',{},k+') '),v));qc.appendChild(lb);
      });
      page.appendChild(qc);
    });
    const bar=el('div',{css:{position:'sticky',bottom:'.5rem',background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:'12px',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'1rem'}});
    bar.appendChild(el('div',{css:{fontSize:'13px',color:'var(--color-text-secondary)'}},
      answered<total?'Faltan '+(total-answered)+' por contestar':'¡Todas contestadas!'));
    const subBtn=btn('Entregar examen','btn-success',submitExam,answered<total);
    bar.appendChild(subBtn);page.appendChild(bar);
  }
  return page;
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  await checkStorage();
  try{
    const cfgRaw=await sGet(SK.config);
    if(cfgRaw){const c=JSON.parse(cfgRaw);if(c.pin)S.savedPin=c.pin;}
    const grpRaw=await sGet(SK.groups);
    if(grpRaw)S.groups=JSON.parse(grpRaw);
  }catch{}
  render();
}
init();
</script>
</body>
